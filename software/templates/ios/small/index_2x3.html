<html>
  <head>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="iNGOT Panel" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>iNGOT</title>
    <link
      rel="stylesheet"
      href="/static/ios/small/style.css?v=20260614-mobile"
    />
  </head>
  <body>
    <img
      class="hero-image"
      src="/static/ios/small/background.png?v=20260614-test"
      alt=""
    />
    <main class="panel">
      <table class="button-grid" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td>
            <form action="/living_room_toggle">
              <button class="image-button" type="submit" method="post">
                <img
                  src="/static/ios/small/light_bulb_couch.png"
                  alt="Living Room Toggle"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/dining_room_toggle">
              <button class="image-button" type="submit" method="post">
                <img
                  src="/static/ios/small/light_bulb_table.png"
                  alt="Dining Room Toggle"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/downstairs_toggle" style="display: inline">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/small/light_bulb_house.png"
                  alt="All Off"
                />
              </button>
            </form>
          </td>
        </tr>
        <tr>
          <td>
            <form action="/playpause" style="display: inline">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/small/tv.png"
                  alt="Play/Pause"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/playpause" style="display: inline">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/small/tv.png"
                  alt="Play/Pause"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/playpause" style="display: inline">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/small/tv.png"
                  alt="Play/Pause"
                />
              </button>
            </form>
          </td>
        </tr>
      </table>
    </main>
  </body>
</html>
