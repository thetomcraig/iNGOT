<html>
  <head>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Living Room" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Living Room</title>
    <link
      rel="stylesheet"
      href="/static/living_room.css?v=20260614-mobile"
    />
  </head>
  <body>
    <iframe name="sink" style="visibility:hidden;width:0;height:0;border:0;position:absolute"></iframe>
    <main class="panel">
      <table class="button-grid" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td>
              <form action="/living_room_toggle" method="post" target="sink">
              <button class="image-button" type="submit">
                <img src="/static/ios/light_bulb_couch.png" alt="Living Room Toggle" />
              </button>
            </form>
          </td>
          <td>
            <form action="/dining_room_toggle" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/light_bulb_table.png"
                  alt="Dining Room Toggle"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/downstairs_toggle" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/light_bulb_house.png"
                  alt="All Off"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/vacuum_start" method="post">
              <button class="image-button" type="submit" method="post" target="sink">
                <img
                  src="/static/ios/vacuum_start.png"
                  alt="Start Vacuum"
                />
              </button>
            </form>
          </td>
        </tr>
        <tr>
          <td>
            <form action="/playpause" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/tv.png"
                  alt="Play Pause"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/home" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/hobbit_hole.png"
                  alt="Home"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/ice_maker_toggle" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/ice_maker.png"
                  alt="Ice Maker Toggle"
                />
              </button>
            </form>
          </td>
          <td>
            <form action="/vacuum_stop" method="post" target="sink">
              <button class="image-button" type="submit">
                <img
                  src="/static/ios/vacuum_stop.png"
                  alt="Stop Vacuum"
                />
              </button>
            </form>
          </td>
        </tr>
      </table>
    </main>
  </body>
</html>
